events {}

http {

	# Mime типы (Директива массив)
	include mime.types;
	
	# Кодировка (Стандартная директива)
	charset utf8; 

	# Логги (Директива массив)
	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log debug;

	server {

		# Конфигурация для локального хоста (Стандартные директивы)
		listen 80;
		server_name localhost;

		# Корневая папка (Стандартная директива)
		root /var/www/example; 

		# Этот блок не требуется, так как браузер
		# И так ищет файл index.html который находится в root
		# Будь бы название файла, или расположение другим
		# То нам бы пришлось его тут указать
		location / {
			index index.html;
		}

		# Несуществующий маршрут в нашей веб-странице
		location /notexists {
			# Передаем его на index.html
			rewrite ^ /index.html;
		}

		# Еще один не существующий маршрут
		location /notexists2 {
			return 500;
		}

		# Поиск картинок
		location /pictures {
			# Переопределяем директиву логов
			access_log off;
			# Директива try_files
			try_files $uri /$uri =404;
		}
	}
}