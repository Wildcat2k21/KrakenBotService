events {}

http {

	# Mime типы
	include mime.types;
	
	# Кодировка
	charset utf8; 

	server {

		# Конфигурация для локального хоста
		listen 80;
		server_name localhost;

		# Корневая папка статичных файлов веб-приложения
		root /var/www/myfirstapp;

		# Проксирование запросов на роут /room
		location /room {
			proxy_pass http://localhost:3000;  # Проксирование на localhost:3000

			# Передаем нужные загловки запроса proxy
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection 'upgrade';
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
		}

		# Проксирование для socket.io
		location /socket.io/ {
			proxy_pass http://localhost:3000;  # Проксирование для socket.io

			# Передаем нужные загловки запроса proxy
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
		}
	}
}