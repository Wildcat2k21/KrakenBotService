events {}

http {

	include mime.types;
	# Пример наследуемой директивы
	charset utf8; 

	server {
		listen 80;
		server_name localhost;
		# Корневая папка
		root /var/www/example; 

		#Этот блок не требуется, так как браузер
		#И так ищет файл index.html который раздается с root
		location / {
			index index.html;
		}

		#Логги
		access_log /var/log/nginx/access.log;
		error_log /var/log/nginx/error.log debug;

		#Поиск картинок
		location /pictures {
			access_log off;
			try_files $uri /$uri =404;
		}
	}
}