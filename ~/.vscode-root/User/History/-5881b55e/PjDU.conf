events {}

http {

	include mime.types;
	# Пример наследуемой директивы
	charset utf8; 

	# Пример наследуемой директивы
	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log debug;

	server {

		# Конфигурация для локального хоста
		listen 80;
		server_name localhost;

		# Корневая папка
		root /var/www/example; 

		# Этот блок не требуется, так как браузер
		# И так ищет файл index.html который находится в root
		# Будь бы название файла другим, нам бы пришлось его тут указать
		location / {
			index index.html;
		}

		# Поиск картинок
		location /pictures {
			# Переопределяем директиву логов
			access_log off;
			try_files $uri /$uri =404;
		}
	}
}