

# Число экземпляров (авто - макс), если не указано, то 1
worker_processes auto;

events {}

http {

	server {

		# Конфигурация для локального хоста
		listen 80;
		server_name localhost;

		# Кодировка UTF-8 для поддержки множества языков
		charset utf8;

		# Корневая папка статичных файлов веб-приложения
		root /var/www/myfirstapp;

		# Проксирование запросов на роут /room
		location /room {
			proxy_pass http://localhost:3030;  # Проксирование на localhost:3000

			# Передаем важные загловки запроса proxy
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection 'upgrade';
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
		}

		# Проксирование для socket.io
		location /socket.io/ {
			proxy_pass http://localhost:3030;  # Проксирование для socket.io

			# Передаем важные загловки запроса proxy
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
		}
	}
}